<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Whatsapp</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="toast-container"></div>
    <div id="login" class="login">
        <div class="box">
            <h2>CRM Whatsapp</h2>
            <input id="user" placeholder="Usuário">
            <input id="pass" type="password" placeholder="Senha">
            <button class="green" style="width:100%" onclick="login()">Entrar</button>
        </div>
    </div>
    <div id="app" class="hidden">
        <div class="container">
            <div id="painelAdm" class="card hidden" style="margin-bottom:20px; border:2px solid var(--blue);">
                <h3>👑 Painel Administrativo</h3>
                <div id="admStats" class="grid" style="grid-template-columns: repeat(4, 1fr); margin-bottom:15px;"></div>
                <div class="flex-group">
                    <input id="newOpUser" placeholder="Novo Operador">
                    <input id="newOpPass" placeholder="Senha">
                    <button class="blue" onclick="cadastrarOperador()">Criar Usuário</button>
                </div>
            </div>
            <button class="red" onclick="logout()">Sair do Sistema</button>
            <div id="lista"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
