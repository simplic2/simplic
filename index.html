<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Whatsapp</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="toast-container"></div>
    <div id="login" class="login">
        <div class="box">
            <h2>CRM Whatsapp</h2>
            <p>Painel de Controle Operacional</p>
            <input id="user" placeholder="Usuário">
            <input id="pass" type="password" placeholder="Senha">
            <select id="selectCarteira" style="margin-top: 12px; font-weight: 600;">
                <option value="Simplic">Carteira Simplic</option>
                <option value="Loft">Carteira Loft</option>
            </select>
            <button class="green" style="width:100%; margin-top: 18px;" onclick="login()">Entrar no Sistema</button>
        </div>
    </div>
    <div id="app" class="hidden">
        <div class="container">
            <div id="painelAdm" class="card hidden" style="margin-bottom: 25px; border: 2px solid var(--blue);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="margin: 0;">👑 Painel Administrativo</h3>
                </div>
                <div id="admStats" class="grid" style="grid-template-columns: repeat(4, 1fr); margin-bottom: 15px;"></div>
            </div>
            <div class="header-app">
                <h1>CRM Whatsapp</h1>
                <div class="user-badge">
                    <span>Operador: <strong id="lblUsuario" style="color: var(--primary);">---</strong></span>
                    <a href="#" onclick="abrirModal('modalJogo')" style="margin-left:10px; color: var(--blue);">🎮 Jogo</a>
                    <a href="#" onclick="abrirModal('modalMusica')" style="margin-left:10px; color: var(--orange);">🎵 Música</a>
                    <a href="#" onclick="logout()" style="margin-left:10px; color: var(--red);">Sair</a>
                </div>
            </div>
            <div class="kpi-container">
                <div class="kpi-card"><span class="kpi-title">📋 Fila</span><span class="kpi-value" id="kpiTotalFila">0</span></div>
                <div class="kpi-card"><span class="kpi-title">🚀 Enviados</span><span class="kpi-value" id="kpiEnviados">0</span></div>
            </div>
            <div class="card">
                <h3>📱 Instâncias</h3>
                <div id="waList"></div>
            </div>
            <div class="grid" style="margin-top:20px;">
                <div class="card" id="lista">
                    <h3>📋 Fila de Contatos</h3>
                    <input id="buscaContatoInput" placeholder="Buscar por número..." oninput="filtrarEBuscarFila()">
                </div>
                <div class="card">
                    <h3>📝 Scripts & Preview</h3>
                    <div id="scriptsContainerList" style="max-height: 150px; overflow-y: auto;"></div>
                    <hr>
                    <label class="small">Visualização:</label>
                    <div id="preview"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL EDITAR (CONSOLIDADO) -->
    <div id="modalEditar" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Editar Instância</h3>
            <label class="small">Número</label>
            <input id="editModalNumero">
            
            <label class="small" style="margin-top: 10px; display: block;">Status</label>
            <select id="editModalStatus" onchange="toggleTempoRestritoVisibilidade()">
                <option value="ativo">Ativo</option>
                <option value="restrito">Restrito</option>
                <option value="banido">Banido</option>
            </select>

            <div id="containerTempoRestrito" class="hidden" style="margin-top: 10px;">
                <label class="small">Tempo de Restrição</label>
                <input id="editModalTempo" placeholder="Ex: 5">
            </div>

            <div class="flex-group" style="justify-content: flex-end; margin-top: 15px;">
                <button class="gray" onclick="fecharModal('modalEditar')">Cancelar</button>
                <button id="btnSalvarEdicao" class="green">Salvar</button>
            </div>
        </div>
    </div>

    <!-- MODAL IMPORT CONTACTS -->
    <div id="modalContatos" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Importar Contatos</h3>
            <label class="small">Escolha o Script:</label>
            <select id="modalSelectScriptDefinido" style="margin-top:4px; margin-bottom:12px;"></select>
            <label class="small">Cole a lista (formato: telefone;nome):</label>
            <textarea id="telefonesInputModal" rows="6" placeholder="5511999999999;João" style="margin-top:4px;"></textarea>
            <div class="flex-group" style="margin-top: 20px;">
                <button class="gray" onclick="fecharModal('modalContatos')" style="flex:1;">Cancelar</button>
                <button class="green" onclick="salvarContatos()" style="flex:1;">Inserir na Fila</button>
            </div>
        </div>
    </div>

    <!-- MODAL MANAGEMENT SCRIPT -->
    <div id="modalScript" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="tituloScriptModal">Criar Novo Script</h3>
            <input type="hidden" id="editScriptId" value="">
            <label class="small">Título do Script</label>
            <input id="nomeScriptModal" style="margin-top:4px; margin-bottom:12px;">
            <label class="small">Mensagem (use {nome}):</label>
            <textarea id="textoScriptModal" rows="7" style="margin-top:4px;"></textarea>
            <div class="flex-group" style="margin-top: 20px;">
                <button class="gray" onclick="fecharModal('modalScript')" style="flex:1;">Cancelar</button>
                <button class="blue" onclick="salvarScript()" style="flex:1;">Salvar Script</button>
            </div>
        </div>
    </div>

    <!-- MODAL MUSIC PLAYER -->
    <div id="modalMusica" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>🎵 Player de Música</h3>
            <div id="abaMusicaBusca">
                <label class="small">Digite o artista ou música:</label>
                <div class="flex-group" style="margin-top:4px; margin-bottom:10px;">
                    <input id="inputBuscaNome" placeholder="Ex: Coldplay" style="margin-top:0;">
                    <button class="blue" onclick="buscarMusicaPorNome()" style="margin-top:0; height: 45px;">Buscar</button>
                </div>
                <div id="containerResultadosBusca" style="max-height: 180px; overflow-y: auto;"></div>
            </div>
            <button class="gray" onclick="fecharModal('modalMusica')" style="width:100%; margin-top:15px;">Fechar</button>
        </div>
    </div>

    <!-- MODAL MINI-GAME -->
    <div id="modalJogo" class="modal-overlay hidden">
        <div class="modal-content" style="width: 320px; text-align: center;">
            <h3>🎮 Jogo da Velha</h3>
            <div id="tabuleiro" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0;">
                <!-- Os 9 quadrados do jogo -->
                <div class="quadrado" onclick="jogada(0)" style="background: var(--bg-input); height: 70px; border-radius: 8px; cursor: pointer;"></div>
                <div class="quadrado" onclick="jogada(1)" style="background: var(--bg-input); height: 70px; border-radius: 8px; cursor: pointer;"></div>
                <div class="quadrado" onclick="jogada(2)" style="background: var(--bg-input); height: 70px; border-radius: 8px; cursor: pointer;"></div>
                <div class="quadrado" onclick="jogada(3)" style="background: var(--bg-input); height: 70px; border-radius: 8px; cursor: pointer;"></div>
                <div class="quadrado" onclick="jogada(4)" style="background: var(--bg-input); height: 70px; border-radius: 8px; cursor: pointer;"></div>
                <div class="quadrado" onclick="jogada(5)" style="background: var(--bg-input); height: 70px; border-radius: 8px; cursor: pointer;"></div>
                <div class="quadrado" onclick="jogada(6)" style="background: var(--bg-input); height: 70px; border-radius: 8px; cursor: pointer;"></div>
                <div class="quadrado" onclick="jogada(7)" style="background: var(--bg-input); height: 70px; border-radius: 8px; cursor: pointer;"></div>
                <div class="quadrado" onclick="jogada(8)" style="background: var(--bg-input); height: 70px; border-radius: 8px; cursor: pointer;"></div>
            </div>
            <button class="gray" onclick="fecharModal('modalJogo')">Fechar</button>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
