<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema de Envios</title>
    <!-- Aqui linkamos o seu arquivo de estilo externo -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h2>Bem-vindo</h2>
        <p>Selecione seu portal de envio</p>
    </div>

    <!-- Seletor Simplic / Loft -->
    <div class="company-selector">
        <button type="button" class="company-btn active-simplic" id="btn-select-simplic" onclick="selectCompany('simplic')">Simplic</button>
        <button type="button" class="company-btn" id="btn-select-loft" onclick="selectCompany('loft')">Loft</button>
    </div>

    <!-- O formulário agora chama uma função JavaScript em vez de enviar para o servidor diretamente -->
    <form id="loginForm" onsubmit="handleLogin(event)">
        <!-- Campo oculto para enviar a empresa selecionada -->
        <input type="hidden" id="empresa" name="empresa" value="simplic">

        <div class="input-group">
            <label for="username">Usuário</label>
            <input type="text" id="username" placeholder="Digite seu usuário" required>
        </div>

        <div class="input-group">
            <label for="password">Senha</label>
            <input type="password" id="password" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="submit-btn btn-simplic" id="submitBtn">Entrar</button>
    </form>
</div>

<script>
    // LISTA DE USUÁRIOS DE TESTE (Simulando o banco de dados)
    const usuariosDB = [
      { username: "Levi", senhaHash: "2104" }, // Usuário da Simplic (padrão)
      { username: "usuario1", senhaHash: "senha123" }, // Outro usuário antigo (Simplic)
      { username: "admin", senhaHash: "admin123", role: "ADMIN_GLOBAL" }, // Administrador Geral (entra em ambas)
      { username: "loftuser", senhaHash: "loft123", empresa_origem: "loft" } // Usuário exclusivo da Loft
    ];

    function selectCompany(company) {
        const btnSimplic = document.getElementById('btn-select-simplic');
        const btnLoft = document.getElementById('btn-select-loft');
        const inputEmpresa = document.getElementById('empresa');
        const submitBtn = document.getElementById('submitBtn');

        inputEmpresa.value = company;

        if (company === 'simplic') {
            btnSimplic.classList.add('active-simplic');
            btnLoft.classList.remove('active-loft');
            submitBtn.className = 'submit-btn btn-simplic';
        } else {
            btnLoft.classList.add('active-loft');
            btnSimplic.classList.remove('active-simplic');
            submitBtn.className = 'submit-btn btn-loft';
        }
    }

    function handleLogin(event) {
        event.preventDefault(); // Impede a página de recarregar e quebrar o fluxo

        const usernameInput = document.getElementById('username').value;
        const passwordInput = document.getElementById('password').value;
        const empresaSelecionada = document.getElementById('empresa').value;

        // Procura o usuário na lista (respeitando letras maiúsculas/minúsculas)
        const usuario = usuariosDB.find(u => u.username === usernameInput);

        if (!usuario || passwordInput !== usuario.senhaHash) {
            alert("Erro: Usuário ou senha incorretos.");
            return;
        }

        // REGRA 1: Se for Administrador Global, entra direto em qualquer uma
        if (usuario.role === "ADMIN_GLOBAL") {
            alert(`Bem-vindo, Administrador! Você acessou o painel da: ${empresaSelecionada.toUpperCase()}`);
            // Altere para a sua tela de envios (ex: "painel.html") se for o caso:
            window.location.href = "index.html"; 
            return;
        }

        // REGRA 2: Usuários antigos sem empresa definida viram Simplic por padrão
        const empresaDoUsuario = usuario.empresa_origem || "simplic";

        // REGRA 3: Bloqueia acesso cruzado
        if (empresaDoUsuario !== empresaSelecionada) {
            alert(`Acesso negado: Este usuário pertence à ${empresaDoUsuario.toUpperCase()} e tentou entrar pela ${empresaSelecionada.toUpperCase()}.`);
            return;
        }

        // Se passou em todas as regras:
        alert(`Login realizado com sucesso! Bem-vindo ao painel da ${empresaSelecionada.toUpperCase()}.`);
        // Altere para a sua tela de envios (ex: "painel.html") se for o caso:
        window.location.href = "index.html";
    }
</script>

</body>
</html>
